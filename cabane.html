<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link href="patapam.css" rel="stylesheet">
    <link href="cabane.css" rel="stylesheet">
    <title data-i18n="title">La Cabane de Patapam</title>
</head>
<body>
    <header>
        <nav class="lang-switcher">
            <button onclick="setLanguage('fr')" data-lang="fr">
                <img src="img/fr.png" alt="Français">
            </button>
            <button onclick="setLanguage('en')" data-lang="en">
                <img src="img/eng.png" alt="English">
            </button>
            <button onclick="setLanguage('he')" data-lang="he">
                <img src="img/he.png" alt="עברית">
            </button>
        </nav>
    </header>
    <main>
        <h1 data-i18n="cabaneTitle">Bienvenue dans la cabane de Patapam !</h1>
    </main>
    <script src="patapam.js"></script>
    <script src="cabane.js"></script>
</body>
</html>
